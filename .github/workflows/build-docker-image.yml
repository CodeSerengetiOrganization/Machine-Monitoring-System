name: Build & Package MMS Backend

# Trigger workflow on merge/push to develop and PRs targeting develop
on:
  workflow_dispatch:        # allows manual run & makes workflow visible
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-22.04  # pinned for reproducibility

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Build Spring Boot JAR
      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests

      # Step 4: Build Docker image
      - name: Build Docker image
        run: docker build -t mms-backend:1.0.0 .

      # Step 5: Save Docker image as a .tar artifact
      - name: Save Docker image to tar
        run: docker save -o mms-backend.tar mms-backend:1.0.0

      # Step 6: Upload Docker image artifact
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: mms-backend-image
          path: mms-backend.tar
