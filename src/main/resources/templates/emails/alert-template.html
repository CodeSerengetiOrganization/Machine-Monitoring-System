<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Machine Monitoring Alert</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background-color: #f9f9f9; }
        .header { background-color: #ff4d4d; color: white; padding: 15px; border-radius: 5px 5px 0 0; text-align: center; }
        .content { padding: 20px; }
        .footer { text-align: center; font-size: 0.8em; color: #777; margin-top: 20px; padding-top: 10px; border-top: 1px solid #eee; }
        .highlight { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>🚨 Urgent Machine Alert! 🚨</h2>
    </div>
    <div class="content">
        <p>Dear Field Engineer Team,</p>
        <p>This is an automated alert from the Machine Monitoring System.</p>
<!--        <p>The following machine unit(s) "<span class="highlight" th:text="${machineName}">Machine XYZ</span>" have detected critical issue:</p>-->
        <p><span class="highlight" th:utext="${machineUnitListStr}">0</span></p>
        <p>Please investigate this issue immediately.</p>
        <p>Alert Timestamp: <span th:text="${#temporals.format(alertTimestamp, 'yyyy-MM-dd HH:mm:ss')}"></span></p>
    </div>
    <div class="footer">
        <p>This is an automated message. Please do not reply.</p>
        <p>&copy; Machine Monitoring System</p>
    </div>
</div>
</body>
</html>
