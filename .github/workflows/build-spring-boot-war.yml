name: Build Spring Boot WAR and Upload as Artifact

on:
  push:
    branches:
      - develop # Or your desired branch (e.g., develop)
  workflow_dispatch: # Allows you to manually trigger the workflow

jobs:
  build-and-artifact:
    runs-on: ubuntu-latest # You can also use windows-latest if your build relies on Windows specifics

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java and Maven
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin' # Or 'adopt', 'zulu', 'oracle'
        java-version: '17'      # Match this to your project's Java version in pom.xml

    - name: Clean, Build, and Package WAR using Maven
      # This command will compile your Java code, run tests, and produce the WAR file.
      run: mvn clean package -f pom.xml

    - name: Find the generated WAR file
      id: find_war # Assign an ID to this step to reference its outputs
      run: |
        # Use mvn help:evaluate to get the final name of the WAR
        # -Dexpression=project.build.finalName evaluates the finalName
        # -q makes it quiet
        # -DforceStdout forces output to stdout
        # -P jboss ensures the same profile is active for correct evaluation if profiles affect name
        FINAL_NAME=$(mvn help:evaluate -Dexpression=project.build.finalName -q -DforceStdout -f pom.xml -P jboss)
        WAR_FILE_PATH="target/${FINAL_NAME}.war"

        if [ ! -f "$WAR_FILE_PATH" ]; then
          echo "ERROR: Expected WAR file '$WAR_FILE_PATH' not found in 'target/' directory after build."
          echo "Listing 'target/' directory contents for debugging:"
          ls -R target/ || true
          exit 1
        fi

        echo "WAR_FILE=$WAR_FILE_PATH" >> $GITHUB_OUTPUT
        echo "Dynamically determined WAR file: $WAR_FILE_PATH"

    - name: Upload WAR as a GitHub Artifact
      uses: actions/upload-artifact@v4
      with:
        name: machinemonitorsystem-war # This is the artifact zip file name
        path: ${{ steps.find_war.outputs.WAR_FILE }} # Use the path found in the previous step
        retention-days: 30 # How long to keep the artifact (optional)