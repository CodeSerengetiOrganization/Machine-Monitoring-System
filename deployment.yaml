apiVersion: apps/v1
kind: Deployment
metadata:
  name: mms-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mms-backend
  template:
    metadata:
      labels:
        app: mms-backend
    spec:
      containers:
        - name: mms-backend
          image: mms-backend:latest   # local image inside minikube
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://172.30.32.1:3306/kir_server_db?serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: linemachine
            - name: SPRING_DATASOURCE_PASSWORD
              value: 1234fast
---
apiVersion: v1
kind: Service
metadata:
  name: mms-backend-service
spec:
  type: NodePort
  selector:
    app: mms-backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080   # exposed port on your laptop
