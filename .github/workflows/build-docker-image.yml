name: Build & Package MMS Backend

# Trigger workflow on merge/push to develop and PRs targeting develop
on:
  workflow_dispatch:        # allows manual run & makes workflow visible
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-22.04  # pinned for reproducibility

    permissions:
      contents: read
      packages: write       # CHANGED: write is required to push docker image to GHCR

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Configure Maven settings.xml for GitHub Packages authentication
      # This allows Maven to download machine-monitoring-system-config
      - name: Configure Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Build Spring Boot JAR
      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # REQUIRED for package download

      # Step 5: Extract version from pom.xml once and set as workflow environment variable
      - name: Set version from pom.xml
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "PROJECT_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version is $VERSION"

      # Step 6: Log in to GitHub Container Registry (GHCR)
      - name: Login to GitHub Container Registry (GHCR)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Step 7: Build Docker image with GHCR naming convention
      - name: Build Docker image for GHCR
        run: |
          echo "Building Docker image with version $PROJECT_VERSION"
          docker build -t mms-backend:$PROJECT_VERSION .
          docker tag mms-backend:$PROJECT_VERSION ghcr.io/codeserengetiorganization/mms-backend:$PROJECT_VERSION
          docker tag mms-backend:$PROJECT_VERSION ghcr.io/codeserengetiorganization/mms-backend:latest

      # Step 8: Push Docker image to GHCR
      - name: Push Docker image to GHCR
        run: |
          echo "Pushing Docker image with version $PROJECT_VERSION"
          docker push ghcr.io/codeserengetiorganization/mms-backend:$PROJECT_VERSION
          docker push ghcr.io/codeserengetiorganization/mms-backend:latest

      # Step 9: (Optional) Save Docker image as a .tar artifact
      - name: Save Docker image to tar
        run: |
          echo "Saving Docker image with version $PROJECT_VERSION"
        # docker save -o mms-backend-$PROJECT_VERSION.tar ghcr.io/...:$PROJECT_VERSION
        # docker save -o mms-backend-latest.tar ghcr.io/...:latest
          docker save -o mms-backend-${PROJECT_VERSION}.tar ghcr.io/codeserengetiorganization/mms-backend:${PROJECT_VERSION}
          docker save -o mms-backend-latest.tar ghcr.io/codeserengetiorganization/mms-backend:latest


      # Step 10: Upload Docker image artifact (GitHub Packages v4 syntax)
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: mms-backend-image-${{ env.PROJECT_VERSION }}    # artifact name in GitHub UI
          path: mms-backend-${{ env.PROJECT_VERSION }}.tar      # matches the file you just saved
