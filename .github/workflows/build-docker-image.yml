name: Build & Package MMS Backend

# Trigger workflow on merge/push to develop and PRs targeting develop
on:
  workflow_dispatch:        # allows manual run & makes workflow visible
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-22.04  # pinned for reproducibility

    permissions:
      contents: read
      packages: read       # REQUIRED for downloading dependency from GitHub Packages

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Configure Maven settings.xml for GitHub Packages authentication
      # This allows Maven to download machine-monitoring-system-config
      - name: Configure Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Build Spring Boot JAR
      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # REQUIRED for package download

      # Step 5: Build Docker image
      - name: Build Docker image
        run: docker build -t mms-backend:1.0.0 .

      # Step 6: Save Docker image as a .tar artifact
      - name: Save Docker image to tar
        run: docker save -o mms-backend.tar mms-backend:1.0.0

      # Step 7: Upload Docker image artifact (GitHub Packages v4 syntax)
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: mms-backend-image
          path: mms-backend.tar
